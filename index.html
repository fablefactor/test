<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathway to B1 — English Tutor</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="curriculum.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #F2F5F4; font-family: 'Avenir Next','Segoe UI',system-ui,-apple-system,sans-serif; color: #1C2B33; }
    #root { min-height: 100vh; }

    /* ── Flashcard flip ── */
    .fc-scene { perspective: 1000px; width: 100%; min-height: 180px; cursor: pointer; user-select: none; }
    .fc-card { width: 100%; min-height: 180px; position: relative; transform-style: preserve-3d; transition: transform 0.45s ease; }
    .fc-card.flipped { transform: rotateY(180deg); }
    .fc-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 18px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 28px 24px; text-align: center; border: 1px solid #DDE5E3; }
    .fc-back { transform: rotateY(180deg); }

    /* ── Progress bar ── */
    .prog-bar { height: 8px; border-radius: 4px; background: #DDE5E3; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 4px; background: #146C60; transition: width .4s ease; }

    /* ── Buttons ── */
    button { font-family: inherit; transition: opacity .15s; }
    button:active:not(:disabled) { transform: scale(0.97); }

    /* ── Mic recording pulse ── */
    @keyframes micPulse {
      0%   { box-shadow: 0 0 0 0 rgba(226,76,76,0.55); transform: scale(1); }
      70%  { box-shadow: 0 0 0 22px rgba(226,76,76,0); transform: scale(1.06); }
      100% { box-shadow: 0 0 0 0 rgba(226,76,76,0); transform: scale(1); }
    }
    .mic-recording { animation: micPulse 1.2s ease-out infinite; }

    /* ── Theory HTML content ── */
    .theory-body strong { color: #146C60; font-weight: 700; }
    .theory-body em { font-style: italic; color: #5C6B72; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Colors ── */
const C = {
  bg:"#F2F5F4", card:"#FFFFFF", ink:"#1C2B33", sub:"#5C6B72",
  teal:"#146C60", tealSoft:"#E0EEEB", amber:"#F4A93D", amberSoft:"#FBEFD9",
  coral:"#E2604C", coralSoft:"#FAE4E0", green:"#3FA873", greenSoft:"#E1F2E9",
  line:"#DDE5E3", purple:"#6B4FBB", purpleSoft:"#EDE8F8",
};
const FONT = "'Avenir Next','Segoe UI',system-ui,-apple-system,sans-serif";

/* ══ Localization helpers ══════════════════════════════════════
   lang is 'en' (English immersion — no translations shown) or 'es' (Spanish). */
const topicTitle   = (tp,lang)  => lang==='es' ? (tp.titleEs||tp.title) : tp.title;
const theoryHeading= (sec,lang) => lang==='es' ? (sec.headingEs||sec.heading) : sec.heading;
const theoryBody   = (sec,lang) => lang==='es' ? (sec.bodyEs||sec.body) : sec.body;
// English immersion shows no translation line under examples; Spanish shows the es translation.
const exTranslation= (ex,lang)  => lang==='es' ? (ex.es||'') : '';
// Flashcard back: Spanish translation, or a plain-English definition in immersion mode.
const cardBack     = (card,lang)=> lang==='es' ? (card.es||card.enDef||'') : (card.enDef||card.es||'');
const cardBackLabel= (lang)     => lang==='es' ? 'Español' : 'Definition';
const quizExplain  = (q,lang)   => lang==='es' ? (q.explainEs||q.explain) : q.explain;
const UI           = (lang,en,es)=> lang==='es' ? es : en;

const LEVELS = ["A1","A2","B1"];
const LEVEL_TOPICS = {
  A1:["a1-greet","a1-num","a1-fam","a1-food","a1-day","a1-town"],
  A2:["a2-past","a2-shop","a2-travel","a2-health","a2-work","a2-plans"],
  B1:["b1-opinion","b1-story","b1-if","b1-news","b1-email","b1-feel"],
};
const PRON_SENTENCES = {
  A1:[
    "Hello, my name is Anna and I am from Denmark.",
    "I would like a coffee with milk, please.",
    "The supermarket is next to the train station.",
    "She works every day from nine to five.",
    "We have three children and one dog.",
    "What time is it now?",
    "Today is Monday and tomorrow is Tuesday.",
    "My mother has brown hair and blue eyes.",
  ],
  A2:[
    "Yesterday I went to the cinema with my friends.",
    "Could you tell me how to get to the airport?",
    "I have a headache and a sore throat.",
    "We are going to visit my parents next weekend.",
    "How much does this jacket cost?",
    "I worked in a restaurant when I was younger.",
    "She applied for a job as an engineer last month.",
    "Did you see the football match last night?",
  ],
  B1:[
    "In my opinion, learning a language takes patience and practice.",
    "If I had more time, I would travel around the world.",
    "She told me that the meeting had been cancelled.",
    "I have been living in Copenhagen for three years.",
    "Although it was raining, we decided to walk home.",
    "I am writing to enquire about the position advertised online.",
    "By the time we arrived, the train had already left.",
    "I couldn't agree more — protecting the environment is our biggest challenge.",
  ],
};

/* ══ Placement Test Questions ═══════════════════════════════ */
const PLACEMENT_QS = [
  // A1
  {q:"What ___ your name?",opts:["is","are","am","have"],ans:0,level:"A1"},
  {q:"I have ___ older sister.",opts:["a","an","the","—"],ans:0,level:"A1"},
  {q:"She ___ to school every day.",opts:["go","goes","going","gone"],ans:1,level:"A1"},
  {q:"The bank is ___ the post office. (directly across the road)",opts:["next to","opposite","between","behind"],ans:1,level:"A1"},
  {q:"How ___ does this cost?",opts:["much","many","old","far"],ans:0,level:"A1"},
  {q:"'Half past seven' means:",opts:["7:00","7:15","7:30","7:45"],ans:2,level:"A1"},
  {q:"I ___ drink coffee — I prefer tea.",opts:["always","never","sometimes","still"],ans:1,level:"A1"},
  // A2
  {q:"Yesterday she ___ to the cinema.",opts:["go","goes","went","has gone"],ans:2,level:"A2"},
  {q:"We ___ go to school last Monday — it was a holiday.",opts:["didn't","don't","not","haven't"],ans:0,level:"A2"},
  {q:"How long ___ you had this cough?",opts:["have","did","do","are"],ans:0,level:"A2"},
  {q:"She works ___ a nurse at the hospital.",opts:["like","for","as","in"],ans:2,level:"A2"},
  {q:"'A return ticket' means you:",opts:["travel one way only","travel there and back","get a refund","upgrade to first class"],ans:1,level:"A2"},
  {q:"We ___ visit my parents next weekend. (plan already booked)",opts:["will","are going to","shall","would"],ans:1,level:"A2"},
  {q:"'Do you have this in a larger ___?' (clothing shop)",opts:["price","colour","size","model"],ans:2,level:"A2"},
  // B1
  {q:"Direct: 'I am happy.' → Reported: 'She said she ___ happy.'",opts:["is","was","were","has been"],ans:1,level:"B1"},
  {q:"'I was walking home when I ___ a loud noise.' (main event)",opts:["heard","was hearing","had heard","hear"],ans:0,level:"B1"},
  {q:"'If I ___ more money, I would buy a house.' (second conditional)",opts:["have","had","would have","having"],ans:1,level:"B1"},
  {q:"You know the recipient's name. You end the formal email with:",opts:["Yours faithfully,","Yours sincerely,","Best wishes,","Cheers,"],ans:1,level:"B1"},
  {q:"'___ my opinion, we should invest more in public transport.'",opts:["In","From","By","With"],ans:0,level:"B1"},
  {q:"'By the time we arrived, the train ___.' (left before we got there)",opts:["left","was leaving","had left","has left"],ans:2,level:"B1"},
];

/* ══ Streak Tracking ════════════════════════════════════════ */
const todayStr=()=>new Date().toISOString().slice(0,10);
function loadStreak(){ try{ const v=localStorage.getItem('ptb1:streak'); return v?JSON.parse(v):{streak:0,best:0,last:null}; }catch{ return{streak:0,best:0,last:null}; } }
function touchStreak(){
  const s=loadStreak(); const today=todayStr();
  if(s.last===today) return s;
  const yd=new Date(today); yd.setDate(yd.getDate()-1); const yesterday=yd.toISOString().slice(0,10);
  const ns=(s.last===yesterday)?s.streak+1:1;
  const updated={streak:ns,best:Math.max(ns,s.best||0),last:today};
  try{ localStorage.setItem('ptb1:streak',JSON.stringify(updated)); }catch{}
  return updated;
}

/* ══ Wrong Answer Tracking ══════════════════════════════════ */
function getWrongs(){ try{ const v=localStorage.getItem('ptb1:wrongs'); return v?JSON.parse(v):[]; }catch{ return[]; } }
function addWrong(topicId,qi){
  const ws=getWrongs(); const idx=ws.findIndex(w=>w.topicId===topicId&&w.qi===qi);
  if(idx>=0){ws[idx].count++;ws[idx].last=Date.now();}else{ws.push({topicId,qi,count:1,last:Date.now()});}
  try{ localStorage.setItem('ptb1:wrongs',JSON.stringify(ws)); }catch{}
}
function clearWrong(topicId,qi){ try{ localStorage.setItem('ptb1:wrongs',JSON.stringify(getWrongs().filter(w=>!(w.topicId===topicId&&w.qi===qi)))); }catch{} }
function getTopWrongs(n=12){ return getWrongs().sort((a,b)=>b.count-a.count).slice(0,n); }

/* ══ Spaced Repetition (Leitner) ═══════════════════════════ */
const BOX_INTERVALS = [0, 1, 60*12, 60*24, 60*24*3, 60*24*7]; // minutes

function fcKey(id,i){ return `ptb1:fc:${id}:${i}`; }
function getFCS(id,i){ try{ const v=localStorage.getItem(fcKey(id,i)); return v?JSON.parse(v):{box:0,next:0}; }catch{ return{box:0,next:0}; } }
function setFCS(id,i,s){ try{ localStorage.setItem(fcKey(id,i),JSON.stringify(s)); }catch{} }
function answerCard(id,i,result){
  const s=getFCS(id,i);
  const nb=result==='good'?Math.min(s.box+1,5):result==='close'?Math.max(s.box-1,1):1;
  setFCS(id,i,{box:nb,next:Date.now()+BOX_INTERVALS[nb]*60000});
}
function getDueCards(id){
  const tp=CURRICULUM[id]; if(!tp)return[];
  const now=Date.now();
  return tp.flashcards.map((c,i)=>({...c,index:i,...getFCS(id,i)})).filter(c=>c.next<=now);
}
function getMastery(id){ const tp=CURRICULUM[id]; if(!tp)return 0; return tp.flashcards.filter((_,i)=>getFCS(id,i).box>=5).length; }
function allDue(){ return Object.keys(CURRICULUM).reduce((s,id)=>s+getDueCards(id).length,0); }

/* ══ Persistence ════════════════════════════════════════════ */
function loadApp(){ try{ const v=localStorage.getItem('ptb1:app'); return v?JSON.parse(v):null; }catch{return null;} }
function saveApp(s){ try{ localStorage.setItem('ptb1:app',JSON.stringify(s)); }catch{} }

/* ══ Reset helpers ══════════════════════════════════════════ */
function clearLevelStorage(lv){
  const ids=LEVEL_TOPICS[lv]||[];
  try{
    Object.keys(localStorage).forEach(k=>{ if(ids.some(id=>k.startsWith(`ptb1:fc:${id}:`))) localStorage.removeItem(k); });
    localStorage.setItem('ptb1:wrongs',JSON.stringify(getWrongs().filter(w=>!ids.includes(w.topicId))));
  }catch{}
}
function clearAllProgress(){
  // Wipe everything except the chosen tutor language.
  try{ Object.keys(localStorage).filter(k=>k.startsWith('ptb1:')&&k!=='ptb1:lang').forEach(k=>localStorage.removeItem(k)); }catch{}
}

/* ══ TTS ════════════════════════════════════════════════════ */
function speak(text,rate=0.9){
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.lang='en-GB'; u.rate=rate;
    const vs=window.speechSynthesis.getVoices();
    const v=vs.find(v=>v.lang&&v.lang.startsWith('en-GB'))||vs.find(v=>v.lang&&v.lang.startsWith('en'));
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ══ Speech Recognition ══════════════════════════════════════ */
const SR=typeof window!=='undefined'&&(window.SpeechRecognition||window.webkitSpeechRecognition);
function lev(a,b){ const m=a.length,n=b.length; if(!m)return n;if(!n)return m; const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]); for(let j=0;j<=n;j++)d[0][j]=j; for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1)); return d[m][n]; }
const norm=s=>s.toLowerCase().replace(/[^a-z0-9'\s]/g,'').replace(/\s+/g,' ').trim();
function scorePron(target,heard){
  const tw=norm(target).split(' ').filter(Boolean), hw=norm(heard).split(' ').filter(Boolean);
  const used=new Array(hw.length).fill(false);
  const words=tw.map(w=>{ let best=-1,bd=Infinity; hw.forEach((h,i)=>{ if(used[i])return; const d=lev(w,h); if(d<bd){bd=d;best=i;} }); const tol=w.length<=3?0:w.length<=6?1:2; if(best>=0&&bd===0){used[best]=true;return{w,s:'good'};} if(best>=0&&bd<=tol){used[best]=true;return{w,s:'close'};} return{w,s:'miss'}; });
  const pts=words.reduce((a,x)=>a+(x.s==='good'?1:x.s==='close'?0.5:0),0);
  return{words,pct:Math.round(pts/tw.length*100)};
}
function useListen(onResult){
  const[listening,setListening]=useState(false);
  const[micErr,setMicErr]=useState(null);
  const recRef=useRef(null);
  const cbRef=useRef(onResult);
  useEffect(()=>{ cbRef.current=onResult; },[onResult]);
  // IMPORTANT: rec.start() must run synchronously inside the click gesture.
  // On Safari/iOS, awaiting getUserMedia first drops us out of the user-gesture
  // context and recognition silently never records. So we call start() directly
  // and let SpeechRecognition handle its own mic permission; errors surface via onerror.
  const start=useCallback(()=>{
    if(!SR){ setMicErr('error'); return; }
    setMicErr(null);
    try{ window.speechSynthesis&&window.speechSynthesis.cancel(); }catch(e){}
    try{
      const rec=new SR(); recRef.current=rec; rec.lang='en-GB'; rec.interimResults=false; rec.maxAlternatives=1; rec.continuous=false;
      rec.onresult=e=>{ setListening(false); try{ cbRef.current(e.results[0][0].transcript); }catch(_){} };
      rec.onerror=e=>{ setListening(false); const c=(e&&e.error)||'unknown'; setMicErr(c==='not-allowed'||c==='service-not-allowed'?'perm':c==='no-speech'?'nospeech':c==='aborted'?null:'error'); };
      rec.onend=()=>setListening(false);
      setListening(true); rec.start();
    }catch(e){ setListening(false); setMicErr('error'); }
  },[]);
  const stop=useCallback(()=>{ try{recRef.current&&recRef.current.stop();}catch(e){} setListening(false); },[]);
  return{listening,start,stop,supported:!!SR,micErr};
}

/* ══ Shared UI ═══════════════════════════════════════════════ */
const S={
  page:{minHeight:'100vh',background:C.bg,color:C.ink,fontFamily:FONT,display:'flex',justifyContent:'center'},
  shell:{width:'100%',maxWidth:580,padding:'20px 16px 60px'},
  card:{background:C.card,borderRadius:18,padding:18,boxShadow:'0 1px 4px rgba(28,43,51,0.09)',border:`1px solid ${C.line}`},
  btn:(bg,col='#fff',off=false)=>({background:off?C.line:bg,color:off?C.sub:col,border:'none',borderRadius:12,padding:'12px 18px',fontSize:16,fontWeight:700,cursor:off?'default':'pointer',fontFamily:FONT}),
  ghost:{background:'transparent',color:C.teal,border:`1.5px solid ${C.teal}`,borderRadius:12,padding:'10px 16px',fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:FONT},
};

function BackBar({title,onBack}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
      <button onClick={onBack} style={{...S.ghost,padding:'8px 14px',fontSize:14}}>← Back</button>
      <h2 style={{margin:0,fontSize:19,fontWeight:800,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{title}</h2>
    </div>
  );
}
function ProgBar({value,max,color=C.teal}){
  const pct=max>0?Math.round(value/max*100):0;
  return <div className="prog-bar"><div className="prog-fill" style={{width:`${pct}%`,background:color}}/></div>;
}
function Badge({color,bg,children}){
  return <span style={{background:bg,color,fontSize:12,fontWeight:800,padding:'3px 10px',borderRadius:99}}>{children}</span>;
}

/* ══ Placement Test ══════════════════════════════════════════ */
function PlacementTest({onDone}){
  const[qi,setQi]=useState(0);
  const[picked,setPicked]=useState(null);
  const[checked,setChecked]=useState(false);
  const[answers,setAnswers]=useState([]);

  const q=PLACEMENT_QS[qi];
  const last=qi===PLACEMENT_QS.length-1;
  const isRight=picked===q.ans;

  const doCheck=()=>setChecked(true);

  const doNext=()=>{
    const newAnswers=[...answers,{level:q.level,correct:picked===q.ans}];
    if(last){
      const by={A1:{ok:0,tot:0},A2:{ok:0,tot:0},B1:{ok:0,tot:0}};
      newAnswers.forEach(a=>{by[a.level].tot++;if(a.correct)by[a.level].ok++;});
      const pct=lv=>by[lv].tot>0?by[lv].ok/by[lv].tot*100:0;
      let lv='A1';
      if(pct('A1')>=60&&pct('A2')>=60)lv='B1';
      else if(pct('A1')>=60)lv='A2';
      try{localStorage.setItem('ptb1:placementDone','1');}catch{}
      onDone(lv);
    }else{
      setAnswers(newAnswers);
      setQi(qi+1);
      setPicked(null);
      setChecked(false);
    }
  };

  const lvCol={A1:C.teal,A2:'#9A6B12',B1:C.purple};
  return(
    <div>
      <div style={{textAlign:'center',padding:'28px 0 18px'}}>
        <div style={{fontSize:44,marginBottom:10}}>🎯</div>
        <h1 style={{margin:0,fontSize:24,fontWeight:800,color:C.teal}}>Placement Test</h1>
        <div style={{color:C.sub,fontSize:14,marginTop:4}}>Let's find your starting level — {PLACEMENT_QS.length} quick questions</div>
      </div>
      <div style={{marginBottom:8}}><ProgBar value={qi+1} max={PLACEMENT_QS.length}/></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:13,color:C.sub,fontWeight:600}}>{qi+1} / {PLACEMENT_QS.length}</div>
        <Badge color={lvCol[q.level]} bg={q.level==='A1'?C.tealSoft:q.level==='A2'?C.amberSoft:C.purpleSoft}>{q.level}</Badge>
      </div>
      <div style={{...S.card,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:17,lineHeight:1.5}}>{q.q}</div>
      </div>
      <div style={{display:'grid',gap:8,marginBottom:14}}>
        {q.opts.map((op,i)=>{
          let bg=C.card,bdr=C.line;
          if(checked&&i===q.ans){bg=C.greenSoft;bdr=C.green;}
          else if(checked&&i===picked&&!isRight){bg=C.coralSoft;bdr=C.coral;}
          else if(!checked&&i===picked){bg=C.tealSoft;bdr=C.teal;}
          return(
            <button key={i} disabled={checked} onClick={()=>setPicked(i)}
              style={{background:bg,border:`2px solid ${bdr}`,borderRadius:12,padding:'12px 14px',textAlign:'left',fontSize:16,fontWeight:600,cursor:checked?'default':'pointer',fontFamily:FONT}}>
              {op}
            </button>
          );
        })}
      </div>
      {!checked?(
        <button disabled={picked==null} onClick={doCheck}
          style={{...S.btn(picked==null?C.line:C.teal,'#fff',picked==null),width:'100%'}}>Check</button>
      ):(
        <button onClick={doNext}
          style={{...S.btn(C.teal),width:'100%'}}>{last?'See my level →':'Next →'}</button>
      )}
      <button onClick={()=>{try{localStorage.setItem('ptb1:placementDone','1');}catch{}onDone('A1');}}
        style={{...S.ghost,width:'100%',marginTop:10,fontSize:13}}>Skip — start from A1</button>
    </div>
  );
}

/* ══ Level Path ══════════════════════════════════════════════ */
function LevelPath({level,setLevel,lang,completed}){
  return(
    <div style={{...S.card,padding:'18px 16px'}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,color:C.sub,textTransform:'uppercase',marginBottom:12}}>{UI(lang,'Your Level','Tu nivel')}</div>
      <div style={{display:'flex',alignItems:'center'}}>
        {LEVELS.map((lv,i)=>{
          const ids=LEVEL_TOPICS[lv];
          const done=ids.filter(id=>(completed||[]).includes(id)).length;
          const active=level===lv;
          return(
            <React.Fragment key={lv}>
              {i>0&&<div style={{flex:1,borderTop:`3px dotted ${C.line}`,margin:'0 4px',transform:'translateY(-12px)'}}/>}
              <button onClick={()=>setLevel(lv)} style={{background:'transparent',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:5,fontFamily:FONT}}>
                <div style={{width:56,height:56,borderRadius:'50%',background:active?C.teal:C.tealSoft,color:active?'#fff':C.teal,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:17,border:active?`3px solid ${C.amber}`:'3px solid transparent',transition:'all .2s'}}>{lv}</div>
                <div style={{fontSize:11,color:C.sub,fontWeight:600}}>{done}/{ids.length}</div>
              </button>
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

/* ══ Home ════════════════════════════════════════════════════ */
function HomeScreen({level,setLevel,lang,xp,completed,dueCount,streak,weakCount,onNav}){
  const modes=[
    {id:'lessons',icon:'📚',title:UI(lang,'Lessons','Lecciones'),desc:UI(lang,'Theory → Examples → Quiz','Teoría → Ejemplos → Cuestionario'),col:C.teal,bg:C.tealSoft},

function LessonsScreen({level,lang,completed,onComplete,addXP,onBack}){
  const[topic,setTopic]=useState(null);
  if(!topic) return(
    <div>
      <BackBar title={`${UI(lang,'Lessons','Lecciones')} · ${level}`} onBack={onBack}/>
      <div style={{fontWeight:700,color:C.sub,marginBottom:10,fontSize:14}}>{UI(lang,'Choose a topic','Elige un tema')}</div>
      <div style={{display:'grid',gap:10}}>
        {LEVEL_TOPICS[level].map(id=>{
          const tp=CURRICULUM[id]; const done=(completed||[]).includes(id);
          return(
            <button key={id} onClick={()=>setTopic(id)} style={{...S.card,display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left',fontFamily:FONT,fontSize:16}}>
              <span style={{fontSize:26}}>{tp.icon}</span>
              <span style={{flex:1,fontWeight:700}}>{topicTitle(tp,lang)}</span>
              {done&&<Badge color={C.green} bg={C.greenSoft}>{UI(lang,'✓ Done','✓ Hecho')}</Badge>}
            </button>
          );
        })}
      </div>
    </div>
  );
  return <LessonFlow topicId={topic} lang={lang} onBack={()=>setTopic(null)} onComplete={(score)=>{onComplete(topic,score);setTopic(null);}} addXP={addXP}/>;
}

function LessonFlow({topicId,lang,onBack,onComplete,addXP}){
  const tp=CURRICULUM[topicId];
  const[step,setStep]=useState('theory');
  const[tIdx,setTIdx]=useState(0);
  const[qi,setQi]=useState(0);
  const[picked,setPicked]=useState(null);
  const[checked,setChecked]=useState(false);
  const[right,setRight]=useState(0);

  const resetQuiz=()=>{ setQi(0);setPicked(null);setChecked(false);setRight(0); };

  if(step==='theory'){
    const sec=tp.theory[tIdx]; const last=tIdx===tp.theory.length-1;
    return(
      <div>
        <BackBar title={topicTitle(tp,lang)} onBack={onBack}/>
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {tp.theory.map((_,i)=>(
            <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=tIdx?C.teal:C.line,transition:'background .3s'}}/>
          ))}
        </div>
        <div style={{...S.card,marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:16,color:C.teal,marginBottom:10}}>📖 {theoryHeading(sec,lang)}</div>
          <div className="theory-body" style={{fontSize:15,lineHeight:1.7,color:C.ink}} dangerouslySetInnerHTML={{__html:theoryBody(sec,lang)}}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          {tIdx>0&&<button onClick={()=>setTIdx(tIdx-1)} style={S.ghost}>{UI(lang,'← Prev','← Anterior')}</button>}
          <button onClick={()=>{ if(last)setStep('examples'); else setTIdx(tIdx+1); }} style={{...S.btn(C.teal),flex:1}}>
            {last?UI(lang,'See Examples →','Ver ejemplos →'):UI(lang,'Next →','Siguiente →')}
          </button>
        </div>
      </div>
    );
  }

  if(step==='examples') return(
    <div>
      <BackBar title={topicTitle(tp,lang)} onBack={()=>{setStep('theory');setTIdx(0);}}/>
      <div style={{...S.card,marginBottom:10,background:C.tealSoft,border:'none',padding:'12px 14px'}}>
        <div style={{fontWeight:700,fontSize:14,color:C.teal}}>{UI(lang,'Read and listen to the examples, then take the quiz.','Lee y escucha los ejemplos, luego haz el cuestionario.')}</div>
      </div>
      <div style={{display:'grid',gap:8,marginBottom:18}}>
        {tp.examples.map((ex,i)=>{
          const tr=exTranslation(ex,lang);
          return(
            <div key={i} style={{...S.card,padding:14,display:'flex',gap:10,alignItems:'flex-start'}}>
              <button onClick={()=>speak(ex.en)} aria-label="Listen" style={{background:C.tealSoft,border:'none',borderRadius:10,width:38,height:38,cursor:'pointer',fontSize:17,flexShrink:0}}>🔊</button>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{ex.en}</div>
                {tr&&<div style={{fontSize:13,color:C.sub,marginTop:3}}>{tr}</div>}
              </div>
            </div>
          );
        })}
      </div>
      <button onClick={()=>setStep('quiz')} style={{...S.btn(C.teal),width:'100%'}}>{UI(lang,'Start Quiz →','Empezar cuestionario →')}</button>
    </div>
  );

  if(step==='quiz'){
    const ex=tp.quiz[qi]; const isRight=picked===ex.correct;
    return(
      <div>
        <BackBar title={`${UI(lang,'Q','P')}${qi+1} ${UI(lang,'of','de')} ${tp.quiz.length}`} onBack={()=>setStep('examples')}/>
        <div style={{marginBottom:12}}><ProgBar value={qi+1} max={tp.quiz.length}/></div>
        <div style={{...S.card,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:17,lineHeight:1.5}}>{ex.q}</div>
        </div>
        <div style={{display:'grid',gap:8}}>
          {ex.options.map((op,i)=>{
            let bg=C.card,bdr=C.line;
            if(checked&&i===ex.correct){bg=C.greenSoft;bdr=C.green;}
            else if(checked&&i===picked&&!isRight){bg=C.coralSoft;bdr=C.coral;}
            else if(!checked&&i===picked){bg=C.tealSoft;bdr=C.teal;}
            return(
              <button key={i} disabled={checked} onClick={()=>setPicked(i)}
                style={{background:bg,border:`2px solid ${bdr}`,borderRadius:12,padding:'12px 14px',textAlign:'left',fontSize:16,fontWeight:600,cursor:checked?'default':'pointer',fontFamily:FONT}}>
                {op}
              </button>
            );
          })}
        </div>
        {checked&&(
          <div style={{...S.card,marginTop:12,background:isRight?C.greenSoft:C.coralSoft,border:'none'}}>
            <div style={{fontWeight:800,color:isRight?C.green:C.coral}}>{isRight?UI(lang,'✓ Correct!','✓ ¡Correcto!'):UI(lang,'✗ Not quite.','✗ Casi.')}</div>
            <div style={{fontSize:14,marginTop:4,lineHeight:1.5}}>{quizExplain(ex,lang)}</div>
          </div>
        )}
        <div style={{marginTop:14}}>
          {!checked?(
            <button disabled={picked==null} onClick={()=>{setChecked(true);if(picked===ex.correct){setRight(r=>r+1);clearWrong(topicId,qi);}else{addWrong(topicId,qi);}}}
              style={{...S.btn(picked==null?C.line:C.teal,'#fff',picked==null),width:'100%'}}>{UI(lang,'Check','Comprobar')}</button>
          ):(
            <button onClick={()=>{ if(qi+1<tp.quiz.length){setQi(qi+1);setPicked(null);setChecked(false);}else setStep('done'); }}
              style={{...S.btn(C.teal),width:'100%'}}>{qi+1<tp.quiz.length?UI(lang,'Next →','Siguiente →'):UI(lang,'See Results →','Ver resultados →')}</button>
          )}
        </div>
      </div>
    );
  }

  // done
  const total=tp.quiz.length; const passed=right>=Math.ceil(total*0.6); const earned=right*10;
  return(
    <div>
      <BackBar title={UI(lang,'Lesson Complete','Lección completada')} onBack={onBack}/>
      <div style={{...S.card,textAlign:'center',padding:36}}>
        <div style={{fontSize:52}}>{passed?'🎉':'💪'}</div>
        <div style={{fontSize:22,fontWeight:800,margin:'12px 0 4px'}}>{right}/{total} {UI(lang,'correct','correctas')}</div>
        <div style={{color:C.sub,fontSize:14,marginBottom:20}}>{passed?UI(lang,'Well done! Lesson complete.','¡Bien hecho! Lección completada.'):UI(lang,'Keep practising — you need 60% to pass.','Sigue practicando — necesitas un 60% para aprobar.')}</div>
        {passed?(
          <button onClick={()=>onComplete(right)} style={{...S.btn(C.teal),width:'100%'}}>
            {UI(lang,`Finish & earn ${earned} XP`,`Terminar y ganar ${earned} XP`)}
          </button>
        ):(
          <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
            <button onClick={()=>{setStep('theory');setTIdx(0);resetQuiz();}} style={S.btn(C.amber,'#1C2B33')}>{UI(lang,'Review lesson','Repasar lección')}</button>
            <button onClick={()=>{setStep('quiz');resetQuiz();}} style={S.btn(C.teal)}>{UI(lang,'Retry quiz','Reintentar')}</button>
          </div>
        )}
      </div>
    </div>
  );
}

        )}
        <div style={{display:'grid',gap:8}}>

                </div>
                {due>0&&<Badge color="#fff" bg={C.purple}>{due}</Badge>}

function FlashcardDeck({topicId,lang,addXP,onBack}){
  const tp=CURRICULUM[topicId];
  const[done,setDone]=useState(false);
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[session]=useState(()=>{ const due=getDueCards(topicId); return due.length>0?due:tp.flashcards.map((c,i)=>({...c,index:i,...getFCS(topicId,i)})); });

  useEffect(()=>setFlipped(false),[idx]);

  if(done||session.length===0) return(
    <div>
      <BackBar title={topicTitle(tp,lang)} onBack={onBack}/>
      <div style={{...S.card,textAlign:'center',padding:36}}>
        <div style={{fontSize:48,marginBottom:12}}>🎴</div>
        <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>{UI(lang,'All cards reviewed!','¡Todas las tarjetas repasadas!')}</div>
        <div style={{color:C.sub,fontSize:14,marginBottom:20}}>{UI(lang,'Cards marked "Got it" are scheduled for later review based on spaced repetition.','Las tarjetas marcadas como "Lo sé" se programan para repasar más tarde mediante repetición espaciada.')}</div>
        <button onClick={onBack} style={{...S.btn(C.purple),width:'100%'}}>{UI(lang,'Back to topics','Volver a los temas')}</button>
      </div>
    </div>
  );

  const card=session[idx];
  const answer=(result)=>{ answerCard(topicId,card.index,result); if(result==='good')addXP(5); if(idx+1>=session.length)setDone(true); else{setIdx(idx+1);setFlipped(false);} };

  return(
    <div>
      <BackBar title={topicTitle(tp,lang)} onBack={onBack}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:13,color:C.sub,fontWeight:600}}>{session.length-idx} {UI(lang,'remaining','restantes')}</div>
        <div style={{display:'flex',gap:5}}>
          {[1,2,3,4,5].map(b=><div key={b} style={{width:8,height:8,borderRadius:'50%',background:(card.box||0)>=b?C.purple:C.line}}/>)}
        </div>
      </div>
      <ProgBar value={idx} max={session.length} color={C.purple}/>
      <div style={{marginTop:12}} className="fc-scene" role="button" tabIndex={0} aria-label="Flip card" onClick={()=>setFlipped(f=>!f)} onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&setFlipped(f=>!f)}>
        <div className={`fc-card${flipped?' flipped':''}`}>
          <div className="fc-face" style={{background:C.card}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,color:C.sub,textTransform:'uppercase',marginBottom:12}}>English</div>
            <div style={{fontWeight:800,fontSize:20,lineHeight:1.4}}>{card.front}</div>
            <div style={{fontSize:13,color:C.sub,marginTop:14}}>{UI(lang,'Tap to reveal','Toca para revelar')}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.tealSoft}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,color:C.teal,textTransform:'uppercase',marginBottom:12}}>{cardBackLabel(lang)}</div>
            <div style={{fontWeight:800,fontSize:lang==='es'?20:18,lineHeight:1.4,color:C.teal}}>{cardBack(card,lang)}</div>
            <div style={{fontSize:13,color:C.teal,marginTop:14,opacity:.7}}>{UI(lang,'How well did you know this?','¿Cómo de bien lo sabías?')}</div>
          </div>
        </div>
      </div>
      {flipped?(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:14}}>
          <button onClick={()=>answer('miss')} style={{...S.btn(C.coralSoft,C.coral)}}>{UI(lang,'✗ Missed','✗ Fallé')}</button>
          <button onClick={()=>answer('close')} style={{...S.btn(C.amberSoft,'#9A6B12')}}>{UI(lang,'〜 Almost','〜 Casi')}</button>
          <button onClick={()=>answer('good')} style={{...S.btn(C.greenSoft,C.green)}}>{UI(lang,'✓ Got it!','✓ ¡Lo sé!')}</button>
        </div>
      ):(
        <button onClick={()=>setFlipped(true)} style={{...S.btn(C.purple),width:'100%',marginTop:14}}>{UI(lang,'Reveal answer','Revelar respuesta')}</button>
      )}
      <button onClick={()=>speak(card.front)} style={{...S.ghost,width:'100%',marginTop:8,fontSize:14}}>🔊 {UI(lang,'Hear pronunciation','Oír pronunciación')}</button>
    </div>
  );
}

/* ══ Weak Points ═════════════════════════════════════════════ */
function WeakPointsScreen({lang,onBack}){
  const[list]=useState(()=>getTopWrongs(12));
  const[idx,setIdx]=useState(0);
  const[picked,setPicked]=useState(null);
  const[checked,setChecked]=useState(false);

  if(list.length===0) return(
    <div>
      <BackBar title={UI(lang,'Weak Points','Puntos débiles')} onBack={onBack}/>
      <div style={{...S.card,textAlign:'center',padding:40}}>
        <div style={{fontSize:52,marginBottom:12}}>✨</div>
        <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>{UI(lang,'No weak points yet!','¡Aún no hay puntos débiles!')}</div>
        <div style={{color:C.sub,fontSize:14,marginBottom:20}}>{UI(lang,'Complete some quizzes — missed questions will appear here for extra practice.','Completa algunos cuestionarios — las preguntas falladas aparecerán aquí para practicar más.')}</div>
        <button onClick={onBack} style={{...S.btn(C.teal),width:'100%'}}>{UI(lang,'Back to home','Volver al inicio')}</button>
      </div>
    </div>
  );

  if(idx>=list.length) return(
    <div>
      <BackBar title={UI(lang,'Weak Points','Puntos débiles')} onBack={onBack}/>
      <div style={{...S.card,textAlign:'center',padding:40}}>
        <div style={{fontSize:52,marginBottom:12}}>🎉</div>
        <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>{UI(lang,'All done!','¡Todo listo!')}</div>
        <div style={{color:C.sub,fontSize:14,marginBottom:20}}>{UI(lang,'Great work — all weak points reviewed this session!','¡Buen trabajo — todos los puntos débiles repasados en esta sesión!')}</div>
        <button onClick={onBack} style={{...S.btn(C.teal),width:'100%'}}>{UI(lang,'Back to home','Volver al inicio')}</button>
      </div>
    </div>
  );

  const w=list[idx];
  const tp=CURRICULUM[w.topicId];
  const qdata=tp&&tp.quiz[w.qi];
  if(!tp||!qdata) return null;

  const isRight=picked===qdata.correct;

  return(
    <div>
      <BackBar title={UI(lang,'Weak Points','Puntos débiles')} onBack={onBack}/>
      <div style={{...S.card,background:C.coralSoft,border:'none',padding:'10px 14px',marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:13,color:C.coral}}>{w.count}× {UI(lang,'missed','fallada')} · {tp.icon} {topicTitle(tp,lang)}</div>
      </div>
      <div style={{marginBottom:12}}><ProgBar value={idx} max={list.length} color={C.coral}/></div>
      <div style={{...S.card,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:17,lineHeight:1.5}}>{qdata.q}</div>
      </div>
      <div style={{display:'grid',gap:8}}>
        {qdata.options.map((op,i)=>{
          let bg=C.card,bdr=C.line;
          if(checked&&i===qdata.correct){bg=C.greenSoft;bdr=C.green;}
          else if(checked&&i===picked&&!isRight){bg=C.coralSoft;bdr=C.coral;}
          else if(!checked&&i===picked){bg=C.tealSoft;bdr=C.teal;}
          return(
            <button key={i} disabled={checked} onClick={()=>setPicked(i)}
              style={{background:bg,border:`2px solid ${bdr}`,borderRadius:12,padding:'12px 14px',textAlign:'left',fontSize:16,fontWeight:600,cursor:checked?'default':'pointer',fontFamily:FONT}}>
              {op}
            </button>
          );
        })}
      </div>
      {checked&&(
        <div style={{...S.card,marginTop:12,background:isRight?C.greenSoft:C.coralSoft,border:'none'}}>
          <div style={{fontWeight:800,color:isRight?C.green:C.coral}}>{isRight?UI(lang,'✓ Correct!','✓ ¡Correcto!'):UI(lang,'✗ Not quite.','✗ Casi.')}</div>
          <div style={{fontSize:14,marginTop:4,lineHeight:1.5}}>{quizExplain(qdata,lang)}</div>
        </div>
      )}
      <div style={{marginTop:14}}>
        {!checked?(
          <button disabled={picked==null} onClick={()=>setChecked(true)}
            style={{...S.btn(picked==null?C.line:C.coral,'#fff',picked==null),width:'100%'}}>{UI(lang,'Check','Comprobar')}</button>
        ):(
          <button onClick={()=>{if(isRight)clearWrong(w.topicId,w.qi);setIdx(i=>i+1);setPicked(null);setChecked(false);}}
            style={{...S.btn(C.teal),width:'100%'}}>{idx+1<list.length?UI(lang,'Next →','Siguiente →'):UI(lang,'Finish →','Terminar →')}</button>
        )}
      </div>
    </div>
  );
}

/* ══ Pronunciation ═══════════════════════════════════════════ */
function PronScreen({level,lang,addXP,onBack}){
  const sentences=PRON_SENTENCES[level];
  const[idx,setIdx]=useState(0);
  const[result,setResult]=useState(null);
  const target=sentences[idx%sentences.length];
  const{listening,start,stop,supported,micErr}=useListen(heard=>{ const r=scorePron(target,heard); setResult({...r,heard}); addXP(Math.round(r.pct/10)); });
  const next=()=>{setIdx(idx+1);setResult(null);try{window.speechSynthesis.cancel();}catch(e){}};
  const wc=(s)=>s==='good'?{bg:C.greenSoft,col:C.green}:s==='close'?{bg:C.amberSoft,col:'#9A6B12'}:{bg:C.coralSoft,col:C.coral};
  return(
    <div>
      <BackBar title={`${UI(lang,'Pronunciation','Pronunciación')} · ${level}`} onBack={onBack}/>
      {!supported&&<div style={{...S.card,background:C.amberSoft,border:'none',marginBottom:12,fontSize:14}}>⚠️ {UI(lang,'Microphone not available. Use Chrome, Edge, or Safari.','Micrófono no disponible. Usa Chrome, Edge o Safari.')}</div>}
      <div style={{...S.card,textAlign:'center',padding:28,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1,color:C.sub,textTransform:'uppercase',marginBottom:14}}>{UI(lang,'Say this sentence','Di esta frase')}</div>
        <div style={{fontSize:19,fontWeight:800,lineHeight:1.55,marginBottom:18}}>"{target}"</div>
        <button onClick={()=>speak(target,0.82)} style={{...S.ghost,marginBottom:20,fontSize:14}}>🔊 {UI(lang,'Hear it first','Escúchala primero')}</button>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
          <button onClick={listening?stop:start} disabled={!supported} aria-label="Microphone" className={listening?'mic-recording':''}
            style={{width:72,height:72,borderRadius:'50%',border:'none',cursor:supported?'pointer':'default',background:listening?C.coral:C.teal,color:'#fff',fontSize:30,boxShadow:listening?'none':'0 2px 6px rgba(0,0,0,.15)',transition:'background .2s',opacity:supported?1:0.4}}>
            {listening?'■':'🎤'}
          </button>
          <div style={{fontSize:13,color:listening?C.coral:C.sub,fontWeight:600}}>
            {listening?UI(lang,'Listening… speak now','Escuchando… habla ahora'):UI(lang,'Tap the microphone and speak','Toca el micrófono y habla')}
          </div>
          {micErr==='perm'&&<div style={{fontSize:12.5,color:C.coral,fontWeight:600}}>{UI(lang,'Microphone blocked. Allow it in browser settings.','Micrófono bloqueado. Permítelo en los ajustes del navegador.')}</div>}
          {micErr==='nospeech'&&<div style={{fontSize:12.5,color:C.coral,fontWeight:600}}>{UI(lang,"I didn't hear anything — try again, a bit louder.",'No oí nada — inténtalo otra vez, un poco más alto.')}</div>}
        </div>
      </div>
      {result&&(
        <div style={{...S.card}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:16}}>{UI(lang,'Match','Coincidencia')}: <span style={{color:result.pct>=85?C.green:result.pct>=60?'#9A6B12':C.coral}}>{result.pct}%</span></div>
            <div style={{fontSize:13,color:C.sub,fontWeight:600}}>{result.pct>=85?UI(lang,'Excellent!','¡Excelente!'):result.pct>=60?UI(lang,'Good — keep going!','¡Bien, sigue así!'):UI(lang,'Keep practising slowly.','Sigue practicando despacio.')}</div>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {result.words.map((w,i)=>{ const{bg,col}=wc(w.s); return <span key={i} style={{background:bg,color:col,padding:'4px 10px',borderRadius:99,fontWeight:700,fontSize:14}}>{w.w}</span>; })}
          </div>
          <div style={{fontSize:12,color:C.sub,marginBottom:14}}>{UI(lang,'I heard','Oí')}: "{result.heard}"</div>
          <button onClick={next} style={{...S.btn(C.teal),width:'100%'}}>{UI(lang,'Next sentence →','Siguiente frase →')}</button>
        </div>
      )}
    </div>
  );
}

/* ══ Progress ════════════════════════════════════════════════ */
function ProgressScreen({xp,lang,completed,streak,onBack}){
  const all=Object.keys(CURRICULUM);
  const totalCards=all.reduce((s,id)=>s+CURRICULUM[id].flashcards.length,0);
  const masteredCards=all.reduce((s,id)=>s+getMastery(id),0);
  const stk=streak||{streak:0,best:0};
  return(
    <div>
      <BackBar title={UI(lang,'Progress','Progreso')} onBack={onBack}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[
          {label:UI(lang,'Total XP','XP total'),val:`${xp} XP`,icon:'⭐',col:C.amber,bg:C.amberSoft},
          {label:UI(lang,'Topics done','Temas hechos'),val:`${(completed||[]).length}/${all.length}`,icon:'📚',col:C.teal,bg:C.tealSoft},
          {label:UI(lang,'Cards mastered','Tarjetas dominadas'),val:`${masteredCards}/${totalCards}`,icon:'🃏',col:C.purple,bg:C.purpleSoft},
          {label:UI(lang,'Cards due now','Tarjetas pendientes'),val:`${allDue()}`,icon:'🔔',col:C.coral,bg:C.coralSoft},
          {label:UI(lang,'Current streak','Racha actual'),val:`${stk.streak} ${UI(lang,stk.streak!==1?'days':'day',stk.streak!==1?'días':'día')}`,icon:'🔥',col:'#C05000',bg:'#FFF0E8'},
          {label:UI(lang,'Best streak','Mejor racha'),val:`${stk.best} ${UI(lang,stk.best!==1?'days':'day',stk.best!==1?'días':'día')}`,icon:'🏆',col:C.amber,bg:C.amberSoft},
        ].map(s=>(
          <div key={s.label} style={{...S.card,background:s.bg,border:'none',textAlign:'center',padding:'16px 12px'}}>
            <div style={{fontSize:28,marginBottom:4}}>{s.icon}</div>
            <div style={{fontWeight:800,fontSize:20,color:s.col}}>{s.val}</div>
            <div style={{fontSize:12,color:C.sub,fontWeight:600,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      {LEVELS.map(lv=>{
        const ids=LEVEL_TOPICS[lv]; const done=ids.filter(id=>(completed||[]).includes(id)).length;
        return(
          <div key={lv} style={{...S.card,marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:15,color:C.teal,marginBottom:8}}>{lv} — {done}/{ids.length} {UI(lang,'topics','temas')}</div>
            <div style={{marginBottom:10}}><ProgBar value={done} max={ids.length}/></div>
            <div style={{display:'grid',gap:7}}>
              {ids.map(id=>{
                const tp=CURRICULUM[id]; const tdone=(completed||[]).includes(id); const m=getMastery(id);
                return(
                  <div key={id} style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:15}}>{tp.icon}</span>
                    <span style={{flex:1,fontSize:14,fontWeight:600,color:tdone?C.ink:C.sub}}>{topicTitle(tp,lang)}</span>
                    {tdone&&<Badge color={C.green} bg={C.greenSoft}>✓</Badge>}
                    <span style={{fontSize:12,color:C.sub}}>{m}/{tp.flashcards.length} {UI(lang,'cards','tarjetas')}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ══ Settings ════════════════════════════════════════════════ */
function SettingsScreen({lang,setLang,onBack,onRerunPlacement,onResetLevel,onResetAll}){
  const langOpts=[
    {id:'en',flag:'🇬🇧',label:'English',sub:UI(lang,'Immersion — no translations','Inmersión — sin traducciones')},
    {id:'es',flag:'🇪🇸',label:'Español',sub:UI(lang,'Spanish translations & explanations','Traducciones y explicaciones en español')},
  ];
  return(
    <div>
      <BackBar title={UI(lang,'Settings','Ajustes')} onBack={onBack}/>

      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,color:C.sub,textTransform:'uppercase',margin:'4px 0 10px'}}>{UI(lang,'Tutor language','Idioma del tutor')}</div>
      <div style={{...S.card,marginBottom:18}}>
        <div style={{fontSize:13,color:C.sub,marginBottom:12,lineHeight:1.5}}>{UI(lang,'Choose how translations and explanations are shown. English uses full immersion (English definitions, no translations); Spanish shows everything translated into Spanish.','Elige cómo se muestran las traducciones y explicaciones. English usa inmersión total (definiciones en inglés, sin traducciones); Español lo muestra todo traducido al español.')}</div>
        <div style={{display:'grid',gap:8}}>
          {langOpts.map(o=>{
            const active=lang===o.id;
            return(
              <button key={o.id} onClick={()=>setLang(o.id)}
                style={{display:'flex',alignItems:'center',gap:12,background:active?C.tealSoft:C.card,border:`2px solid ${active?C.teal:C.line}`,borderRadius:12,padding:'12px 14px',textAlign:'left',cursor:'pointer',fontFamily:FONT}}>
                <span style={{fontSize:26}}>{o.flag}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:15,color:active?C.teal:C.ink}}>{o.label}</div>
                  <div style={{fontSize:12.5,color:C.sub,marginTop:1}}>{o.sub}</div>
                </div>
                {active&&<span style={{color:C.teal,fontWeight:800,fontSize:18}}>✓</span>}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,color:C.sub,textTransform:'uppercase',margin:'4px 0 10px'}}>{UI(lang,'Onboarding','Configuración inicial')}</div>
      <div style={{...S.card,marginBottom:18}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{UI(lang,'Placement test','Prueba de nivel')}</div>
        <div style={{fontSize:13,color:C.sub,marginBottom:12,lineHeight:1.5}}>{UI(lang,'Retake the short test to recalculate your recommended starting level.','Repite la breve prueba para recalcular tu nivel inicial recomendado.')}</div>
        <button onClick={onRerunPlacement} style={{...S.btn(C.teal),width:'100%'}}>🎯 {UI(lang,'Run placement test again','Hacer la prueba de nivel otra vez')}</button>
      </div>

      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,color:C.sub,textTransform:'uppercase',margin:'4px 0 10px'}}>{UI(lang,'Reset progress','Reiniciar progreso')}</div>
      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{UI(lang,'Reset a single level','Reiniciar un solo nivel')}</div>
        <div style={{fontSize:13,color:C.sub,marginBottom:12,lineHeight:1.5}}>{UI(lang,'Clear completed lessons, flashcard memory and weak points for one level only.','Borra las lecciones completadas, la memoria de tarjetas y los puntos débiles de un solo nivel.')}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          {LEVELS.map(lv=>(
            <button key={lv} onClick={()=>onResetLevel(lv)} style={{...S.ghost,padding:'10px 0'}}>{UI(lang,'Reset','Reiniciar')} {lv}</button>
          ))}
        </div>
      </div>
      <div style={{...S.card,marginBottom:18,border:`1.5px solid ${C.coral}`}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4,color:C.coral}}>{UI(lang,'Reset everything','Reiniciar todo')}</div>
        <div style={{fontSize:13,color:C.sub,marginBottom:12,lineHeight:1.5}}>{UI(lang,'Erase all XP, streaks, completed lessons, flashcard progress and weak points, and restart onboarding. This cannot be undone.','Borra todo el XP, las rachas, las lecciones completadas, el progreso de tarjetas y los puntos débiles, y reinicia la configuración inicial. Esto no se puede deshacer.')}</div>
        <button onClick={onResetAll} style={{...S.btn(C.coral),width:'100%'}}>🗑️ {UI(lang,'Reset all progress','Reiniciar todo el progreso')}</button>
      </div>
    </div>
  );
}

/* ══ App Root ════════════════════════════════════════════════ */
function App(){
  const[screen,setScreen]=useState('home');
  const[level,setLevelState]=useState(()=>{ try{return localStorage.getItem('ptb1:level')||'A1';}catch{return'A1';} });
  const[lang,setLangState]=useState(()=>{ try{return localStorage.getItem('ptb1:lang')||'en';}catch{return'en';} });
  const[st,setSt]=useState(()=>loadApp()||{xp:0,completed:[]});
  const[dueCount,setDueCount]=useState(()=>allDue());
  const[streak,setStreak]=useState(()=>loadStreak());
  const[weakCount,setWeakCount]=useState(()=>getTopWrongs(12).length);
  const[showPlacement,setShowPlacement]=useState(()=>{ try{return!localStorage.getItem('ptb1:placementDone');}catch{return false;} });

  useEffect(()=>saveApp(st),[st]);
  useEffect(()=>{ setDueCount(allDue()); setWeakCount(getTopWrongs(12).length); },[screen]);

  const setLevel=(lv)=>{ setLevelState(lv); try{localStorage.setItem('ptb1:level',lv);}catch{} };
  const setLang=(l)=>{ setLangState(l); try{localStorage.setItem('ptb1:lang',l);}catch{} };
  const addXP=n=>{ setSt(s=>({...s,xp:(s.xp||0)+n})); setStreak(touchStreak()); };
  const completeTopic=id=>setSt(s=>({...s,completed:s.completed.includes(id)?s.completed:[...s.completed,id]}));

  const rerunPlacement=()=>{ try{localStorage.removeItem('ptb1:placementDone');}catch{} setScreen('home'); setShowPlacement(true); };
  const resetLevel=(lv)=>{
    if(!window.confirm(`Reset all ${lv} progress?\n\nThis clears your completed ${lv} lessons, flashcard memory and weak points for ${lv}. It cannot be undone.`)) return;
    clearLevelStorage(lv);
    setSt(s=>({...s,completed:(s.completed||[]).filter(id=>!LEVEL_TOPICS[lv].includes(id))}));
    setDueCount(allDue()); setWeakCount(getTopWrongs(12).length);
  };
  const resetAll=()=>{
    if(!window.confirm('Reset ALL progress?\n\nThis erases your XP, streaks, completed lessons, flashcard progress and weak points, and restarts onboarding. It cannot be undone.')) return;
    clearAllProgress();
    setSt({xp:0,completed:[]}); setStreak({streak:0,best:0,last:null});
    setDueCount(0); setWeakCount(0); setLevelState('A1'); setScreen('home'); setShowPlacement(true);
  };

  if(showPlacement) return(
    <div style={S.page}><div style={S.shell}>
      <PlacementTest onDone={(lv)=>{ setLevel(lv); setShowPlacement(false); }}/>
    </div></div>
  );

  return(
    <div style={S.page}>
      <div style={S.shell}>
        {screen==='home'&&<HomeScreen level={level} setLevel={setLevel} lang={lang} xp={st.xp} completed={st.completed} dueCount={dueCount} streak={streak} weakCount={weakCount} onNav={setScreen}/>}
        {screen==='lessons'&&<LessonsScreen level={level} lang={lang} completed={st.completed} onComplete={(id,score)=>{completeTopic(id);addXP(score*10);}} addXP={addXP} onBack={()=>setScreen('home')}/>}
        {screen==='cards'&&<FlashcardsScreen level={level} lang={lang} addXP={addXP} onBack={()=>setScreen('home')}/>}
        {screen==='pron'&&<PronScreen level={level} lang={lang} addXP={addXP} onBack={()=>setScreen('home')}/>}
        {screen==='progress'&&<ProgressScreen xp={st.xp} lang={lang} completed={st.completed} streak={streak} onBack={()=>setScreen('home')}/>}
        {screen==='weakpoints'&&<WeakPointsScreen lang={lang} onBack={()=>{ setWeakCount(getTopWrongs(12).length); setScreen('home'); }}/>}
        {screen==='settings'&&<SettingsScreen lang={lang} setLang={setLang} onBack={()=>setScreen('home')} onRerunPlacement={rerunPlacement} onResetLevel={resetLevel} onResetAll={resetAll}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
