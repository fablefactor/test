<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body>
    <h1 class="visually-hidden">World Clock Application</h1>
    <div class="clocks-container">
        <div class="clock-container">
            <h2>Local Time</h2>
            <div class="clock">
                <span id="hours" aria-live="polite">00</span>:
                <span id="minutes" aria-live="polite">00</span>:
                <span id="seconds" aria-live="polite">00</span>
                <span id="ampm" aria-live="polite">AM</span>
            </div>
            <div id="localLocationInfo" class="info-box" aria-live="polite"></div>
            <button id="formatToggle">Switch to 24H</button>
        </div>

        <div class="clock-container">
            <h2>International Clock</h2>
            <div class="location-selector">
                <img id="selectedFlag" src="" alt="Country flag" width="30">
                <div class="selectors-container">
                    <label for="continentSelect" class="visually-hidden">Select Continent/Region</label>
                    <select id="continentSelect">
                        <option value="">Select Continent/Region</option>
                    </select>
                    <label for="countrySelect" class="visually-hidden">Select Country</label>
                    <select id="countrySelect" disabled>
                        <option value="">Select Country</option>
                    </select>
                    <label for="citySelect" class="visually-hidden">Select City</label>
                    <select id="citySelect" disabled>
                        <option value="">Select City</option>
                    </select>
                    <label for="territoryCitySelect" class="visually-hidden">Select City</label>
                    <select id="territoryCitySelect" disabled>
                        <option value="">Select City</option> 
                    </select>
                </div>
            </div>
            <div class="clock">
                <span id="intHours" aria-live="polite">00</span>:
                <span id="intMinutes" aria-live="polite">00</span>:
                <span id="intSeconds" aria-live="polite">00</span>
                <span id="intAmpm" aria-live="polite">AM</span>
                <!-- dayDiff span is added here by script.js, will add aria-live via JS -->
            </div>
            <div id="cityInfo" class="info-box" aria-live="polite"></div>
            <div class="location-details">
                <div id="timezoneInfo" class="info-box" aria-live="polite"></div>
                <div id="regionInfo" class="info-box" aria-live="polite"></div>
                <div id="populationInfo" class="info-box" aria-live="polite"></div>
            </div>
            <div id="specialNotes" class="info-box" aria-live="polite"></div>
            <div class="metadata-container">
                <div id="administrativeInfo" class="info-box" aria-live="polite"></div>
                <div id="geographicalInfo" class="info-box" aria-live="polite"></div>
                <div id="timezoneCases" class="info-box" aria-live="polite"></div>
            </div>
        </div>
    </div>
    <script src="cities-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
